name: CI

on:
  pull_request:
  push:
    branches: [main]

# Cancel superseded runs for the same branch/PR
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Lint, typecheck & test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npx eslint "src/**/*.{ts,tsx}"

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Unit tests
        run: npm test
