name: CI

on:
  pull_request:
  push:
    branches: [main]

# Cancel superseded runs for the same branch/PR
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Lint, typecheck & test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      # The lockfile is generated with npm 11; match it so `npm ci` doesn't
      # report a (false) out-of-sync error with the npm bundled in Node.
      - name: Pin npm to v11
        run: npm install -g npm@11

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npx eslint "src/**/*.{ts,tsx}"

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Unit tests + coverage
        run: npm run test:coverage

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/
          retention-days: 7
