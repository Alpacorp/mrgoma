name: CI

on:
  pull_request:
  push:
    branches: [main]

# Cancel superseded runs for the same branch/PR
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Lint, typecheck & test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      # Use `npm install`, not `npm ci`: a known npm bug makes `npm ci` strict
      # lockfile validation fail on Linux for wasm bundled deps (@emnapi/* via
      # @napi-rs/wasm-runtime) when the lockfile was generated on Windows. It
      # reports a different @emnapi/* package as "Missing" on each run. `npm
      # install` resolves the tree correctly per-platform while still honoring
      # the committed lockfile, and the build stays reproducible enough for CI.
      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Lint
        run: npx eslint "src/**/*.{ts,tsx}"

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Unit tests + coverage
        run: npm run test:coverage

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/
          retention-days: 7
